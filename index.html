<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shobhit Piano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <div class="piano-container">

            <div class="piano-header">
                <h1>Shobhit Piano</h1>
            </div>

            <div class="piano-keyboard">
                  <!-- White Keys -->
            <div class="white-key">A</div>
            <div class="white-key">S</div>
            <div class="white-key">D</div>
            <div class="white-key">F</div>
            <div class="white-key">G</div>
            <div class="white-key">H</div>
            <div class="white-key">J</div>
            <div class="white-key">K</div>
            <div class="white-key">L</div>
            <div class="white-key">;</div>

            <!-- Black Keys -->
            <div class="black-key key-1">W</div>
            <div class="black-key key-2">E</div>

            <div class="black-key key-3">T</div>
            <div class="black-key key-4">Y</div>
            <div class="black-key key-5">U</div>

            <div class="black-key key-6">O</div>
            <div class="black-key key-7">P</div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>

</body>

</html>
