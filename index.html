<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shobhit Piano</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

    <main>

        <div class="piano-container">

            <div class="piano-header">
                <h1>Virtual Piano</h1>
            </div>

            <div class="piano-keyboard">

                <!-- White Keys -->
<!-- White Keys -->
<div class="white-key key-a">C</div>
<div class="white-key key-s">D</div>
<div class="white-key key-d">E</div>
<div class="white-key key-f">F</div>
<div class="white-key key-g">G</div>
<div class="white-key key-h">A</div>
<div class="white-key key-j">B</div>
<div class="white-key key-k">C</div>
<div class="white-key key-l">D</div>
<div class="white-key key-semicolon">E</div>

<!-- Black Keys -->
<div class="black-key key-1 key-w">C#</div>
<div class="black-key key-2 key-e">D#</div>

<div class="black-key key-3 key-t">F#</div>
<div class="black-key key-4 key-y">G#</div>
<div class="black-key key-5 key-u">A#</div>

<div class="black-key key-6 key-o">C#</div>
<div class="black-key key-7 key-p">D#</div>
            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
