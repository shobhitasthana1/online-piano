<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shobhit Piano</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

    <main>

        <div class="piano-container">

            <div class="piano-header">
                <h1>🎹 SHOBHIT PIANO</h1>
            </div>

            <div class="piano-keyboard">

                <!-- White Keys -->

                <div class="white-key key-a">A</div>
                <div class="white-key key-s">S</div>
                <div class="white-key key-d">D</div>
                <div class="white-key key-f">F</div>
                <div class="white-key key-g">G</div>
                <div class="white-key key-h">H</div>
                <div class="white-key key-j">J</div>
                <div class="white-key key-k">K</div>
                <div class="white-key key-l">L</div>
                <div class="white-key key-semicolon">;</div>



                <!-- Black Keys -->


                <div class="black-key key-1 key-w">W</div>
                <div class="black-key key-2 key-e">E</div>

                <div class="black-key key-3 key-t">T</div>
                <div class="black-key key-4 key-y">Y</div>
                <div class="black-key key-5 key-u">U</div>

                <div class="black-key key-6 key-o">O</div>
                <div class="black-key key-7 key-p">P</div>



            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
